<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWDC Calendar</title>
    <style>
      * {
        margin: 0;
        min-width: 0;
        min-height: 0;
        font-family: sans-serif;
        box-sizing: border-box;
        user-select: none;
      }

      html {
        height: 100%;
      }

      body {
        display: flex;
        height: 100%;
        background-color: #4c4a67;
      }

      #left-side {
        flex: 1;
        background-image: linear-gradient(to right, #232037, #1c1b1b);
      }

      #logo {
        padding: 10px;
        height: 20%;
        background-image: url('https://images.squarespace-cdn.com/content/v1/5fa31a9e206c8a69fd49cfda/1611602029932-VTFLL1ATNQGALUG35LPA/png.png');
        background-size: contain;
        background-origin: content-box;
        background-position: center;
        background-repeat: no-repeat;
      }
      
      #display {
        text-align: center;
        height: calc(80% - 20px);
        margin: 10px;
        border: 1px solid gray;
        border-radius: 6px;
        overflow: auto;
        scrollbar-color: white #1d1c1f;
      }
      
      #day-display, #month-display, #year-display {
        display: none;
        max-height: 100%;
        text-align: left;
        font-size: 0.9cqw;
        padding: 15px 10px;
        gap: 10px;
      }
      
      #day-display.selected, #month-display.selected, #year-display.selected {
        display: inline-grid;
      }
      
      #day-display {
        grid-template-columns: fit-content(33%) 1fr max-content;
        text-wrap: balance;
        text-wrap: pretty;
      }
      
      #day-display .title {
        grid-column: span 3;
        color: white;
        text-align: center;
        font-size: 1.5cqw;
      }
      
      #day-display .header {
        color: white;
        font-weight: bold;
      }
      
      #month-display {
        grid-template-columns: max-content 1fr;
      }
      
      #month-display .title, #year-display .title {
        grid-column: span 2;
        color: white;
        text-align: center;
        font-size: 1.5cqw;
      }
      
      #year-display {
        grid-template-columns: max-content 1fr;
      }
      
      #year-display .color-box {
        aspect-ratio: 1;
      }
      
      #right-side {
        flex: 3;
      }

      #windows {
        position: absolute;
        width: 75%;
        height: 90%;
      }

      #window-banner {
        display: flex;
        position: relative;
        background-image: linear-gradient(to bottom, white, lightgray);
        justify-content: space-between;
        align-items: center;
        height: 10%;
        padding: 0 10px;
        text-align: center;
        font-weight: bold;
        font-size: 2cqw;
      }
      
      #mode-buttons {
        color: gray;
        font-size: 0px; /*Required to make browser stop adding space between divs*/
      }

      #mode-buttons div {
        font-size: 1.25cqw;
        font-weight: bold;
        left: 0px;
        display: inline-block;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 6px;
      }

      #mode-buttons div:hover {
        background-color: lightgray;
      }

      #mode-buttons div.selected {
        background-color: #595e68;
        color: white;
      }

      #window-banner .header {
        display: flex;
        position: absolute;
        left: 50%;
        width: 30%;
        transform: translate(-50%, 0);
        justify-content: space-between;
        align-items: center;
      }
      
      #window-banner .header .nav-btn {
        font-size: 3cqw;
        transform: translate(0, -7%);
      }

      #window-banner .header .nav-btn:hover {
        cursor: pointer;
      }
      
      #window-banner .button {
        font-size: 1.25cqw;
        font-weight: bold;
        border: 1px solid gray;
        border-radius: 6px;
        box-shadow: 1px 1px 1px gray;
        background-image: linear-gradient(to bottom, white, lightgray);
        padding: 4px;
      }
      
      #window-banner .button:hover {
        cursor: pointer;
        box-shadow: 1px 1px 3px gray;
      }
      
      #window-banner .button:active {
        box-shadow: inset 1px 1px 3px gray;
        background-image: linear-gradient(to bottom, lightgray, white);
      }

      #day-window {
        height: 100%;
        display: none;
      }
      
      #day-window.selected {
        display: block;
      }

      #day-window .grid {
        display: grid;
        grid-template-columns: 1fr;
        height: 100%;
        font-size: 1.25cqw;
      }

      #day-window .grid .top {
        font-weight: bold;
        align-content: center;
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
      }

      #day-window .grid .row {
        align-content: center;
      }

      #day-window .grid .side-header {
        display: inline-block;
        text-align: right;
        white-space: nowrap;
        width: 5%;
      }

      #day-window .grid .top-header {
        display: inline-block;
        position: absolute;
        text-align: center;
        width: 15%;
      }

      #day-window .grid .event {
        display: inline-block;
        position: absolute;
        text-align: center;
        align-content: center;
        border-radius: 6px;
        width: 15%;
      }

      #day-window .grid .event:hover {
        box-shadow: 1px 1px 5px black;
        cursor: pointer;
      }

      #month-window {
        display: none;
        height: 100%;
      }
      
      #month-window.selected {
        display: block;
      }

      #month-window .day-header {
        display: grid;
        height: 5%;
        grid-template-columns: repeat(7, 1fr);
      }

      #month-window .day-header-item {
        align-content: center;
        text-align: center;
        font-size: 1cqw;
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
        border: 1px solid lightgray;
        padding: 2px;
      }

      #month-window .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(6, 1fr);
        height: 95%;
      }

      #month-window .grid .box {
        position: relative;
        padding: 4px;
        border: 1px solid lightgray;
        background-color: white;
        font-size: 1cqw;
      }
      
      #month-window .grid .box.today {
        border: 2px solid black;
      }
      
      #month-window .grid .box.today .date {
        font-weight: bold;
      }

      #month-window .grid .box.inactive {
        color: #888;
        background-color: #ccc;
      }

      #month-window .grid .box .date {
        position: absolute;
      }
      
      #month-window .grid .box:hover,
      #month-window .grid .box.selected {
        cursor: pointer;
        border: 1px solid black;
      }
      
      #month-window .grid .box.today:hover {
        border: 2px solid black;
        box-shadow: inset 1px 1px 3px black;
      }
      
      #month-window .grid .box .name {
        width: 100%;
        height: 100%;
        text-align: center;
        align-content: center;
      }

      #year-window {
        display: none;
        height: 100%;
      }
      
      #year-window.selected {
        display: block;
      }

      #year-window .grid {
        display: grid;
        margin-left: auto;
        height: 100%;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        border: 2px solid #4c4a67;
      }

      #year-window .grid .month {
        border: 2px solid #4c4a67;
      }

      #year-window .grid .month .banner {
        font-size: 1cqw;
        font-weight: bold;
        text-align: center;
        align-content: center;
        background-image: linear-gradient(to bottom, white, lightgray);
        height: 10%;
      }
      
      #year-window .grid .month .banner:hover {
        border: 1px solid black;
        cursor: pointer;
      }

      #year-window .grid .month .mgrid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(7, 1fr);
        font-size: 1cqw;
        text-align: center;
        height: 90%;
      }

      #year-window .grid .month .mgrid .day-name {
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
        border: 1px solid lightgray;
        align-content: center;
      }

      #year-window .grid .month .mgrid .date {
        position: relative;
        background-color: white;
        border: 1px solid lightgray;
        align-content: center;
      }
      
      #year-window .grid .month .mgrid .date:hover {
        cursor: pointer;
        border: 1px solid black;
      }
      
      #year-window .grid .month .mgrid .date.today {
        border: 3px solid black;
        font-weight: bold;
      }
      
      #year-window .grid .month .mgrid .date.today:hover {
        border: 4px solid black;
      }
    </style>
  </head>
  
  <body>
    
    <div id="left-side">
      <div id="logo"></div>
      <div id="display">
      </div>
    </div>
    
    <div id="right-side">
      <div id="window-banner">
        <div id="mode-buttons">
          <div>Day</div>
          <div>Month</div>
          <div>Year</div>
        </div>
        <div class="header">
          <div class="nav-btn">‹</div>
          <div class="title-text"></div>
          <div class="nav-btn">›</div>
        </div>
        <div id="today-button" class="button">Today</div>
      </div>
      <div id="windows">
      </div>
    </div>
    
    <script>
      
      const categories = {};
      const testData = {};
      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      
      function addDiv(elem, ...classes) {
        const newElem = document.createElement('div');
        newElem.classList.add(...classes);
        elem.appendChild(newElem);
        return newElem;
      }
      function addSpan(elem, text, ...classes) {
        const newElem = document.createElement('span');
        newElem.classList.add(...classes);
        elem.appendChild(newElem);
        newElem.innerText = text;
        return newElem;
      }
      function dateStr(date, options={day:'numeric', month:'numeric', year:'numeric'}) {
        return date.toLocaleDateString('en-us', options);
      }
      function dateNums(date) {
        return [date.getFullYear(), date.getMonth(), date.getDate()];
      }
      function startOfMonth(day) {
        return new Date(day.getFullYear(), day.getMonth(), 1)
      }
      function endOfMonth(day) {
        return new Date(day.getFullYear(), day.getMonth() + 1, 0)
      }
      function startOfWeek(day) {
        return new Date(day.getFullYear(), day.getMonth(), day.getDate() - day.getDay())
      }
      function addTime(date, mode, amount) {
        switch (mode.toLowerCase()) {
          case 'year':
            date.setDate(1);
            date.setFullYear(date.getFullYear() + amount);
            break;
          case 'month':
            date.setDate(1);
            date.setMonth(date.getMonth() + amount);
            break;
          case 'day':
            date.setDate(date.getDate() + amount);
            break;
        }
      }
      function strToHours(timeStr) {
        const [time, modifier] = timeStr.split(' ');
        let [hours, minutes] = time.split(':').map(Number);
        if (hours == 12) hours = 0;
        if (modifier.toLowerCase() == 'pm') hours += 12;
        return hours + (minutes / 60);
      }
      function render(index) {
        const w = windows[index]
        w.render(testData);
        displayObj.selector.select(index);
        displayObj.render(w, testData);
        switch (index) {
          case 0:
            title.innerText = dateStr(w.date, {day:'numeric', month:'long', year:'numeric'});
            break;
          case 1:
            title.innerText = dateStr(w.date, {month:'long', year:'numeric'});
            break;
          case 2:
            if (w.monthOffset == 0) {
              title.innerText = dateStr(w.date, {year: 'numeric'});
            } else {
              const year = w.date.getFullYear();
              if (w.date.getMonth() < w.monthOffset) year--;
              title.innerText = `${year} - ${year+1}`;
            }
            break;
        }
      }
      function selectTab(index) {
        modeSelector.select(index);
        windowSelector.select(index);
        render(index);
        localStorage.setItem('currentTab', index);
      }
      function loadCategoryPage(target, data) {
        for (const key in target) delete target[key];
        for (const row of data.split(/\r?\n/)) {
          const contents = row.split(',');
          const filtered = contents.filter(s => s != '')
          if (filtered.length == 0) continue;
          const [name, color] = contents;
          target[name] = color;
        }
      }
      function loadDataPage(target, data) {
        let date;
        for (const key in target) delete target[key];
        for (const row of data.split(/\r?\n/)) {
          const contents = row.split(',');
          const filtered = contents.filter(s => s != '')
          if (filtered.length == 0) continue;
          if (contents[0] != '') {
            date = contents[0];
            const [title, category] = contents.slice(1);
            target[date] = {title:title, category:category, schedule:[]};
          } else {
            const entry = contents.slice(1);
            target[date].schedule.push(entry);
          }
        }
      }
      function fetchData(categoryObj, dataObj) {
        const categoryURL = 'https://docs.google.com/spreadsheets/d/1G4BoG5Jumb-N_HVgcvb5e1noY3rL4GG_F5kfpcgIl6s/export?format=csv&gid=1588629629'
        const dataURL = 'https://docs.google.com/spreadsheets/d/1G4BoG5Jumb-N_HVgcvb5e1noY3rL4GG_F5kfpcgIl6s/export?format=csv&gid=0'
        const promises = [
          fetch(categoryURL).then(response => response.text()),
          fetch(dataURL).then(response => response.text())
        ]
        Promise.all(promises).then(data => {
          localStorage.setItem('categoryData', data[0]);
          localStorage.setItem('eventData', data[1]);
          loadCategoryPage(categoryObj, data[0]);
          loadDataPage(dataObj, data[1]);
          render(currentTab)
        });
      }
      function getStored(key, value=null) {
        let result = localStorage.getItem(key);
        if (result === null) result = value;
        return result;
      }
      
      class Display {
        constructor() {
          this.tables = [];
          this.tables.push(document.createElement('div'));
          this.tables.push(document.createElement('div'));
          this.tables.push(document.createElement('div'));
          this.tables[0].id = 'day-display';
          this.tables[1].id = 'month-display';
          this.tables[2].id = 'year-display';
          this.selector = new Selector(...this.tables);
        }
        
        render(w, data) {
          const index = this.selector.index;
          const elem = this.tables[this.selector.index];
          switch (index) {
            case 0:
              let i = 0;
              const colors = ['pink', 'darkgray', 'skyblue', 'goldenrod', 'lightgreen'];
              elem.innerHTML = '';
              addSpan(elem, 'Schedule', 'title');
              addSpan(elem, '', 'title');
              const dataTable = data[dateStr(w.date)];
              if (!dataTable || dataTable.schedule.length == 0) return;
              for (const [...params] of dataTable.schedule) {
                params[2] = params[2] + ' - ' + params.pop();
                params.forEach(item => {
                  const s = addSpan(elem, item);
                  s.style.color = colors[i];
                });
                i++;
                if (i >= colors.length) i = 0;
              }
              break;
            case 1:
              elem.innerHTML = '';
              addSpan(elem, 'Events', 'title');
              addSpan(elem, '', 'title');
              const firstDay = startOfMonth(w.date);
              const lastDay = endOfMonth(w.date);
              let day = firstDay;
              while (day <= lastDay) {
                const key = dateStr(day);
                if (key in data) {
                  const {title, category} = data[key];
                  const k = addSpan(elem, key);
                  const e = addSpan(elem, title);
                  k.style.color = categories[category];
                  e.style.color = categories[category];
                  k.style.textAlign = 'right';
                };
                addTime(day, 'day', 1);
              }
              break;
            case 2:
              elem.innerHTML = '';
              addSpan(elem, 'Legend', 'title');
              addSpan(elem, '', 'title');
              for (const [name, color] of Object.entries(categories)) {
                const c = addDiv(elem, 'color-box');
                const n = addSpan(elem, name);
                c.style.backgroundColor = color;
                n.style.color = color;
              }
              break;
          }
        }
      }
      class DayWindow {
        constructor(startHour, endHour) {
          this.startHour = startHour;
          this.endHour = endHour;
          this.date = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'day-window';
          this.elem.style.gridTemplateRows = `repeat(${endHour - startHour}}, 1fr)`;
          const grid = addDiv(this.elem, 'grid');
          const top = addDiv(grid, 'top');
          addSpan(top, 'Time', 'side-header');
          let time = new Date();
          time.setHours(startHour, 0, 0, 0);
          for (let i=startHour; i<=endHour; i++) {
            const row = addDiv(grid, 'row');
            const headerText = time.toLocaleTimeString('en-US', {
              hour: 'numeric',
              hour12: true,
            }).toLowerCase();
            const s = addSpan(row, headerText, 'side-header');
            const color = (i%2 == 0) ? 'white' : 'lightgray';
            row.style.backgroundColor = color;
            time.setHours(time.getHours() + 1);
          }
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          const rows = grid.children;
          const key = this.date.toLocaleDateString('en-us', {
            month:'numeric', day:'numeric', year:'numeric'
          });
          rows[0].innerHTML = rows[0].children[0].outerHTML;
          rows[1].innerHTML = rows[1].children[0].outerHTML;
          const locations = [];
          const colors = ['pink', 'darkgray', 'skyblue', 'goldenrod', 'lightgreen'];
          let i = 0;
          if (key in data && data[key].schedule.length > 0) {
            for (const [name, location, start, end] of data[key].schedule) {
              let index = locations.indexOf(location) + 1;
              if (index == 0) {
                index = locations.length + 1;
                locations.push(location);
                const header = addSpan(rows[0], location, 'top-header');
                header.style.left = `${15*index-8}%`;
              }
              const block = addDiv(rows[1], 'event');
              const offset = strToHours(start) - this.startHour;
              const duration = strToHours(end) - strToHours(start);
              const count = rows.length - 1
              block.style.top = `${100*(offset + 1)/(count+1)}%`;
              block.style.left = `${15*index-8}%`
              block.style.height = `${100*duration/(count+1)}%`;
              block.style.backgroundColor = colors[i]; i++; if (i >= colors.length) i = 0;
              block.innerText = name;
            }
          }
        }
      }
      class MonthWindow {
        constructor() {
          this.date = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'month-window';
          const dayHeader = addDiv(this.elem, 'day-header');
          const grid = addDiv(this.elem, 'grid');
          for (const name of dayNames) {
            addSpan(dayHeader, name, 'day-header-item');
          }
          for (let i = 0; i < 42; i++) {
            const box = addDiv(grid, 'box');
            const dateText = addDiv(box, 'date');
            const nameText = addDiv(box, 'name');
          }
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          const firstDayOfMonth = startOfMonth(this.date);
          const lastDayOfMonth = endOfMonth(this.date);
          const today = dateStr(new Date());
          let day = startOfWeek(firstDayOfMonth);
          for (let i = 0; i < 42; i++) {
            const box = grid.children[i];
            const dateText = box.querySelector('.date');
            const nameText = box.querySelector('.name');
            const isActive = day >= firstDayOfMonth && day <= lastDayOfMonth;
            box.classList.toggle('inactive', !isActive);
            dateText.innerText = day.getDate();
            const key = dateStr(day);
            box.classList.toggle('today', key==today);
            if (key in data && isActive) {
              const {title, category} = data[key];
              nameText.innerText = title;
              box.style.backgroundColor = categories[category];
            } else {
              nameText.innerText = '';
              box.style.backgroundColor = '';
            }
            addTime(day, 'day', 1);
          }
        }
      }
      class YearWindow {
        constructor(monthOffset = 0) {
          this.monthOffset = monthOffset;
          this.date = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'year-window';
          const grid = addDiv(this.elem, 'grid');
          for (let i = 0; i < 12; i++) {
            const month = addDiv(grid, 'month');
            const banner = addDiv(month, 'banner');
            const mgrid = addDiv(month, 'mgrid');
            for (let j = 0; j < 7; j++) addSpan(mgrid, dayNames[j][0], 'day-name');
            for (let j = 0; j < 42; j++) addDiv(mgrid, 'date');
          }
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          let year = this.date.getFullYear();
          if (this.date.getMonth() < this.monthOffset) year--;
          for (let i = 0; i < 12; i++) {
            const month = new Date(year, i + this.monthOffset, 1);
            const monthBox = grid.children[i];
            const banner = monthBox.querySelector('.banner');
            const monthGrid = monthBox.querySelector('.mgrid');
            const firstDay = startOfMonth(month);
            const lastDay = endOfMonth(month);
            const today = dateStr(new Date());
            banner.innerText = month.toLocaleString('en-US', {month:'long', year:'numeric'});
            for (let j = 0; j < 7; j++) {
              monthGrid.children[j].innerText = dayNames[j][0];
            }
            let day = startOfWeek(firstDay);
            for (let j = 0; j < 42; j++) {
              const box = monthGrid.children[7 + j];
              const withinMonth = firstDay <= day && day <= lastDay;
              if (withinMonth) {
                box.innerText = day.getDate();
                const key = dateStr(day);
                if (key in data) {
                  const {title, category} = data[key];
                  box.style.backgroundColor = categories[category];
                } else {
                  box.style.backgroundColor = '';
                }
                box.classList.toggle('today', key==today);
              } else {
                box.innerText = '';
                box.style.backgroundColor = '';
                box.classList.toggle('today', false);
              }
              addTime(day, 'day', 1);
            }
          }
        }
      }
      class Selector {
        constructor(...elems) {
          this.index = 0;
          this.elems = elems;
          this.className = 'selected';
        }
        
        select(index) {
          this.index = index;
          this.elems.forEach((elem, i) => {
            elem.classList.toggle(this.className, i==index);
          })
        }
      }
      
      let currentTab = Number(getStored('currentTab', 1));
      loadCategoryPage(categories, getStored('categoryData', ''));
      loadDataPage(testData, getStored('eventData', ''));
      fetchData(categories, testData);
      
      const modeButtons = document.getElementById('mode-buttons');
      const display = document.getElementById('display');
      const windowWrapper = document.getElementById('windows');
      const windows = [new DayWindow(8, 24), new MonthWindow(), new YearWindow(6)];
      const windowElems = windows.map(w => w.elem);
      const windowSelector = new Selector(...windowElems);
      const modeSelector = new Selector(...modeButtons.children);
      
      const displayObj = new Display();
      display.append(...displayObj.tables);
      
      windowWrapper.append(...windowElems);
      
      [...modeButtons.children].forEach((button, index) => {
        button.addEventListener('click', () => selectTab(index))
      })
      
      const windowHeader = document.querySelector('#window-banner .header');
      const [lnav, title, rnav] = windowHeader.children;
      lnav.addEventListener('click', () => {
        const i = modeSelector.index;
        addTime(windows[i].date, ['day', 'month', 'year'][i], -1);
        render(i);
      });
      rnav.addEventListener('click', () => {
        const i = modeSelector.index;
        addTime(windows[i].date, ['day', 'month', 'year'][i], 1);
        render(i);
      })
      const todayButton = document.getElementById('today-button');
      todayButton.addEventListener('click', () => {
        for (let i = 0; i < windows.length; i++){
          windows[i].date.setTime(Date.now());
        }
        render(modeSelector.index);
      })
      windowElems[2].addEventListener('click', event => {
        const elem = event.target;
        if (elem.classList.contains('date') && elem.innerText != '') {
          const mElem = elem.parentElement.parentElement;
          const mGrid = mElem.parentElement.children;
          const month = [...mGrid].indexOf(mElem) + + windows[2].monthOffset;
          const day = Number(elem.innerText);
          windows[0].date = new Date(windows[2].date.getFullYear(), month, Number(elem.innerText));
          selectTab(0);
        } else if (elem.classList.contains('banner')) {
          const mElem = elem.parentElement;
          const mGrid = mElem.parentElement.children;
          const month = [...mGrid].indexOf(mElem) + + windows[2].monthOffset;
          windows[1].date = new Date(windows[2].date.getFullYear(), month, 1);
          selectTab(1);
        }
      });
      windowElems[1].addEventListener('click', event => {
        const elem = event.target.parentElement;
        if (elem.classList.contains('box')) {
          const grid = elem.parentElement.children;
          const date = startOfWeek(startOfMonth(windows[1].date));
          addTime(date, 'day', [...grid].indexOf(elem));
          windows[0].date.setTime(date);
          selectTab(0);
        }
      })
      
      selectTab(currentTab);
      
    </script>
  
  </body>
</html>
