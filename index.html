<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWDC Calendar</title>
    <style>
      * {
        margin: 0;
        min-width: 0;
        min-height: 0;
        font-family: sans-serif;
        box-sizing: border-box;
      }
      
      :root {
        height: 100%;
        --font-size-0: 0.9cqw;
        --font-size-1: 1cqw;
        --font-size-2: 1.25cqw;
        --font-size-3: 1.5cqw;
        --font-size-4: 2cqw;
        --font-size-5: 3cqw;
      }
      
      body {
        height: 100%;
        background-color: #4c4a67;
      }
      
      #site-wrapper {
        display: flex;
        width: 100%;
        height: 100%;
      }
      
      #print-container {
        display: none;
        width: 100%;
        text-align: center;
        text-wrap: balance;
        margin: 0;
      }
      
      #print-container .title {
        font-size: 24px;
        font-weight: bold;
        padding: 5px;
      }
      
      #print-container .subtitle {
        font-size: 16px;
      }
      
      #print-container .notes {
        font-size: 16px;
        padding: 20px;
      }
      
      #print-container table {
        display: inline-block;
        text-align: left;
        font-size: 16px;
        border-collapse: collapse;
      }
      
      #print-container th, #print-container td {
        border: 1px solid black;
        padding: 10px;
      }
      
      #print-container th {
        text-wrap: nowrap;
      }
      
      @media print {
        #site-wrapper {
          display: none;
        }
        #print-container {
          display: block;
        }
      }
      
      #left-side {
        flex: 1;
        background-image: linear-gradient(to right, #232037, #1c1b1b);
      }

      #logo {
        padding: 10px;
        height: 20%;
        background-image: url('https://images.squarespace-cdn.com/content/v1/5fa31a9e206c8a69fd49cfda/1611602029932-VTFLL1ATNQGALUG35LPA/png.png');
        background-size: 85% 100%;
        background-origin: content-box;
        background-position: center;
        background-repeat: no-repeat;
      }
      
      #icons {
        position: absolute;
        padding: 10px;
        text-align: right;
      }
      
      #icons svg {
        cursor: pointer;
        width: 8%;
      }
      
      #display {
        position: relative;
        text-align: center;
        height: calc(80% - 20px);
        margin: 10px;
        border: 1px solid gray;
        border-radius: 6px;
        overflow: auto;
        scrollbar-color: white #1d1c1f;
      }
      
      #day-display, #month-display, #year-display {
        display: none;
        max-height: 100%;
        text-align: left;
        font-size: var(--font-size-0);
        padding: 15px 10px;
        gap: 10px;
      }
      
      #day-display.selected, #month-display.selected, #year-display.selected {
        display: inline-grid;
      }
      
      #day-display {
        grid-template-columns: 4fr 3fr max-content;
        text-wrap: balance;
        text-wrap: pretty;
      }
      
      #day-display .title {
        grid-column: span 3;
        color: white;
        text-align: center;
        font-size: var(--font-size-3);
      }
      
      #day-display .subtitle {
        grid-column: span 3;
        color: lightgray;
        text-align: center;
        font-size: var(--font-size-1);
      }
      
      #day-display .header {
        color: white;
        font-weight: bold;
      }
      
      #month-display {
        grid-template-columns: max-content 1fr;
      }
      
      #month-display .title, #year-display .title {
        grid-column: span 2;
        color: white;
        text-align: center;
        font-size: var(--font-size-3);
      }
      
      #year-display {
        grid-template-columns: max-content 1fr;
      }
      
      #year-display .color-box {
        aspect-ratio: 1;
      }
      
      #right-side {
        flex: 3;
      }

      #windows {
        position: absolute;
        width: 75%;
        height: 90%;
      }

      #window-banner {
        display: flex;
        position: relative;
        background-image: linear-gradient(to bottom, white, lightgray);
        justify-content: space-between;
        align-items: center;
        height: 10%;
        padding: 0 10px;
        text-align: center;
        font-weight: bold;
        font-size: var(--font-size-4);
      }
      
      #mode-buttons {
        color: gray;
        font-size: 0px; /*Required to make browser stop adding space between divs*/
      }

      #mode-buttons div {
        font-size: var(--font-size-2);
        font-weight: bold;
        left: 0px;
        display: inline-block;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 6px;
      }

      #mode-buttons div:hover {
        background-color: lightgray;
      }

      #mode-buttons div.selected {
        background-color: #595e68;
        color: white;
      }

      #window-banner .header {
        display: flex;
        position: absolute;
        left: 50%;
        width: 30%;
        transform: translate(-50%, 0);
        justify-content: space-between;
        align-items: center;
      }
      
      #window-banner .header .nav-btn {
        font-size: var(--font-size-5);
        transform: translate(0, -7%);
        user-select: none;
      }

      #window-banner .header .nav-btn:hover {
        cursor: pointer;
      }
      
      #window-banner .button {
        font-size: var(--font-size-2);
        font-weight: bold;
        border: 1px solid gray;
        border-radius: 6px;
        box-shadow: 1px 1px 1px gray;
        background-image: linear-gradient(to bottom, white, lightgray);
        padding: 4px;
      }
      
      #window-banner .button:hover {
        cursor: pointer;
        box-shadow: 1px 1px 3px gray;
      }
      
      #window-banner .button:active {
        box-shadow: inset 1px 1px 3px gray;
        background-image: linear-gradient(to bottom, lightgray, white);
      }

      #day-window {
        height: 100%;
        display: none;
      }
      
      #day-window.selected {
        display: block;
      }

      #day-window .top {
        height: 6%;
        font-size: var(--font-size-2);
        font-weight: bold;
        align-content: center;
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
      }

      #day-window .top .header {
        display: inline-block;
        position: absolute;
        text-align: center;
        width: 15%;
      }
      
      #day-window .top .first-header {
        display: inline-block;
        text-align: right;
        width: 5%;
      }

      #day-window .grid {
        display: grid;
        grid-template-columns: 1fr;
        height: 94%;
        font-size: var(--font-size-2);
      }

      #day-window .grid .row {
        align-content: center;
      }

      #day-window .grid .side-header {
        display: inline-block;
        text-align: right;
        white-space: nowrap;
        width: 5%;
      }

      #day-window .grid .event {
        display: inline-block;
        position: absolute;
        text-align: center;
        align-content: center;
        user-select: none;
        border-radius: 6px;
        width: 15%;
        padding: 3px;
      }

      #day-window .grid .event:hover {
        box-shadow: 1px 1px 5px black;
      }

      #month-window {
        display: none;
        height: 100%;
      }
      
      #month-window.selected {
        display: block;
      }

      #month-window .day-header {
        display: grid;
        height: 5%;
        grid-template-columns: repeat(7, 1fr);
      }

      #month-window .day-header-item {
        align-content: center;
        text-align: center;
        font-size: var(--font-size-1);
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
        border: 1px solid lightgray;
        padding: 2px;
      }

      #month-window .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(6, 1fr);
        height: 95%;
      }

      #month-window .grid .box {
        position: relative;
        padding: 4px;
        border: 1px solid lightgray;
        background-color: white;
        font-size: var(--font-size-1);
      }
      
      #month-window .grid .box.today {
        border: 2px solid black;
      }
      
      #month-window .grid .box.today .date {
        font-weight: bold;
      }

      #month-window .grid .box.inactive {
        color: #888;
        background-color: #ccc;
      }

      #month-window .grid .box .date {
        position: absolute;
      }
      
      #month-window .grid .box:hover,
      #month-window .grid .box.selected {
        cursor: pointer;
        border: 1px solid black;
      }
      
      #month-window .grid .box.today {
        border: 2px solid black;
      }
      
      #month-window .grid .box.today:hover,
      #month-window .grid .box.selected:hover {
        box-shadow: inset 1px 1px 3px black;
      }
      
      #month-window .grid .box .name {
        width: 100%;
        height: 100%;
        text-align: center;
        align-content: center;
      }

      #year-window {
        display: none;
        height: 100%;
      }
      
      #year-window.selected {
        display: block;
      }

      #year-window .grid {
        display: grid;
        margin-left: auto;
        height: 100%;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
        border: 2px solid #4c4a67;
      }

      #year-window .grid .month {
        border: 2px solid #4c4a67;
      }

      #year-window .grid .month .banner {
        font-size: var(--font-size-1);
        font-weight: bold;
        text-align: center;
        align-content: center;
        background-image: linear-gradient(to bottom, white, lightgray);
        height: 10%;
      }
      
      #year-window .grid .month .banner:hover {
        border: 1px solid black;
        cursor: pointer;
      }

      #year-window .grid .month .mgrid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(7, 1fr);
        font-size: var(--font-size-1);
        text-align: center;
        height: 90%;
      }

      #year-window .grid .month .mgrid .day-name {
        background-image: linear-gradient(to bottom, lightcyan, lightblue);
        border: 1px solid lightgray;
        align-content: center;
      }

      #year-window .grid .month .mgrid .date {
        position: relative;
        background-color: white;
        border: 1px solid lightgray;
        align-content: center;
      }
      
      #year-window .grid .month .mgrid .date:hover,
      #year-window .grid .month .mgrid .date.selected {
        cursor: pointer;
        border: 1px solid black;
      }
      
      #year-window .grid .month .mgrid .date.selected:hover {
        cursor: pointer;
        border: 2px solid black;
      }
      
      #year-window .grid .month .mgrid .date.today {
        border: 3px solid black;
        font-weight: bold;
      }
      
      #year-window .grid .month .mgrid .date.today:hover {
        border: 4px solid black;
      }
    </style>
  </head>
  
  <body>
    
    <div id="site-wrapper">
      <div id="left-side">
        <a href="https://www.swwdance.org/" target="_blank" rel="noopener noreferrer">
          <div id="logo"></div>
        </a>
        <div id="display">
          <div id="icons">
            <svg id="print-icon" onclick="printSchedule()" xmlns="http://w3.org" viewBox="0 0 24 24" fill="lightgray" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 10h16a2 2 0 012 2v5a2 2 0 01-2 2H4a2 2 0 01-2-2v-5a2 2 0 012-2z"/>
              <path d="M18 10V4a1 1 0 00-1-1H7a1 1 0 00-1 1v6M6 16h12v6H6z"/>
              <circle cx="18" cy="13" r="1" fill="currentColor"/>
            </svg>
          </div>
        </div>
      </div>
      
      <div id="right-side">
        <div id="window-banner">
          <div id="mode-buttons">
            <div>Day</div>
            <div>Month</div>
            <div>Year</div>
          </div>
          <div class="header">
            <div class="nav-btn">‹</div>
            <div class="title-text"></div>
            <div class="nav-btn">›</div>
          </div>
          <div id="today-button" class="button">Today</div>
        </div>
        <div id="windows">
        </div>
      </div>
    </div>
    
    <div id="print-container">
    </div>
    
    <script>
      
      const eventData = {};
      const weeklyData = {};
      const categories = {};
      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const palette = ['pink', 'skyblue', 'goldenrod', 'lightgreen', 'tan', 'khaki', 'aquamarine', 'mediumpurple'];
      
      function addElem(elem, tag, ...classes) {
        const newElem = document.createElement(tag);
        newElem.classList.add(...classes);
        elem.appendChild(newElem);
        return newElem;
      }
      function addDiv(elem, ...classes) {
        return addElem(elem, 'div', ...classes);
      }
      function addSpan(elem, text, ...classes) {
        const newElem = document.createElement('span');
        newElem.classList.add(...classes);
        elem.appendChild(newElem);
        newElem.innerText = text;
        return newElem;
      }
      function dateStr(date, options={day:'numeric', month:'numeric', year:'numeric'}) {
        return date.toLocaleDateString('en-us', options);
      }
      function titleCase(text) {
        return text.trim().toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
      }
      function startOfMonth(day) {
        return new Date(day.getFullYear(), day.getMonth(), 1)
      }
      function endOfMonth(day) {
        return new Date(day.getFullYear(), day.getMonth() + 1, 0)
      }
      function startOfWeek(day) {
        return new Date(day.getFullYear(), day.getMonth(), day.getDate() - day.getDay())
      }
      function addTime(date, mode, amount) {
        let month;
        switch (mode.toLowerCase()) {
          case 'year':
            month = date.getMonth();
            date.setFullYear(date.getFullYear() + amount);
            if (date.getMonth() != month) date.setMonth(date.getMonth(), 0);
            break;
          case 'month':
            month = date.getMonth() + amount;
            date.setMonth(month);
            if (month < 0) month += 12;
            if (date.getMonth() % 12 != month % 12) date.setMonth(date.getMonth(), 0);
            break;
          case 'day':
            date.setDate(date.getDate() + amount);
            break;
        }
      }
      function strToHours(timeStr) {
        const [time, modifier] = timeStr.split(' ');
        let [hours, minutes] = time.split(':').map(Number);
        if (hours == 12) hours = 0;
        if (modifier.toLowerCase() == 'pm') hours += 12;
        return hours + (minutes / 60);
      }
      function render(index) {
        const w = windows[index]
        w.render(eventData);
        displayObj.selector.select(index);
        displayObj.render(w, eventData);
        switch (index) {
          case 0:
            title.innerText = dateStr(w.date, {day:'numeric', month:'long', year:'numeric'});
            break;
          case 1:
            title.innerText = dateStr(w.date, {month:'long', year:'numeric'});
            break;
          case 2:
            if (w.monthOffset == 0) {
              title.innerText = dateStr(w.date, {year: 'numeric'});
            } else {
              let year = w.date.getFullYear();
              if (w.date.getMonth() < w.monthOffset) year--;
              title.innerText = `${year} - ${year+1}`;
            }
            break;
        }
      }
      function syncDates() {
        const time0 = windows[0].date.getTime();
        const time = windows[windowSelector.index].date.getTime();
        for (let i = windowSelector.index + 1; i < windows.length; i++) {
          windows[i].date.setTime(time);
        };
        windows.slice(1).forEach(w => {
          w.selected.setTime(time0);
        })
      }
      function selectTab(index) {
        syncDates();
        render(index);
        modeSelector.select(index);
        windowSelector.select(index);
        localStorage.setItem('currentTab', index);
      }
      function csvLineToArray(s) {
        let array = [];
        for (const match of s.trim().matchAll(/(".*?"),?|([^"]+)/g)) {
          if (match[1] === undefined) {
            array.push(...match[2].replace(/,$/g, '').split(','));
          } else {
            array.push(match[1].replace(/^"|"$/g, ''));
          }
        }
        return array;
      }
      function indexDateRangeMap(map, date, defaultValue) {
        for (const [range, value] of Object.entries(map)) {
          const [start, end] = range.split('-').map(str => new Date(str));
          if (start <= date && date <= end) return value;
        }
        return defaultValue;
      }
      function loadCategoryPage(target, data) {
        for (const key in target) delete target[key];
        for (const row of data.split(/\r?\n/)) {
          const contents = csvLineToArray(row);
          const filtered = contents.filter(s => s != '')
          if (filtered.length == 0) continue;
          const [name, color] = contents;
          target[titleCase(name)] = color;
        }
      }
      function loadDataPage(target, data) {
        let date;
        for (const key in target) delete target[key];
        for (const row of data.split(/\r?\n/)) {
          const contents = csvLineToArray(row);
          const filtered = contents.filter(s => s != '')
          if (filtered.length == 0) continue;
          if (contents[0] != '') {
            date = contents[0];
            let [title, category, notes] = contents.slice(1);
            title = titleCase(title);
            category = titleCase(category);
            target[date] = {title:title, category:category, notes:notes, schedule:[]};
          } else {
            const entry = contents.slice(1);
            target[date].schedule.push(entry);
          }
        }
      }
      function loadWeekPage(target, data) {
        for (const key in target) delete target[key];
        let duration;
        let day;
        for (const row of data.split(/\r?\n/)) {
          const contents = csvLineToArray(row);
          const filtered = contents.filter(s => s != '')
          if (filtered.length == 0) continue;
          const firstValue = titleCase(contents[0]);
          if (firstValue == 'Duration') {
            duration = contents.slice(1,3).join('-');
            target[duration] = {};
            continue;
          }
          if (!(duration in target)) continue;
          if (dayNames.includes(firstValue)) {
            day = firstValue;
            target[duration][day] = [];
            continue;
          };
          if (!(day in target[duration])) continue;
          target[duration][day].push(contents);
        }
      }
      function fetchData(dataObj, weekObj, categoryObj, dataURL, weekDataURL, categoryURL) {
        const promises = [
          fetch(dataURL).then(response => response.text()),
          fetch(weekDataURL).then(response => response.text()),
          fetch(categoryURL).then(response => response.text())
        ]
        Promise.all(promises).then(data => {
          loadDataPage(dataObj, data[0]);
          loadWeekPage(weekObj, data[1]);
          loadCategoryPage(categoryObj, data[2]);
          render(currentTab)
          localStorage.setItem('eventData', data[0]);
          localStorage.setItem('weekData', data[1]);
          localStorage.setItem('categoryData', data[2]);
        });
      }
      function getStored(key, value='') {
        let result = localStorage.getItem(key);
        if (result === null) result = value;
        return result;
      }
      function printSchedule() {
        const container = document.getElementById('print-container');
        container.innerHTML = '';
        const title = addDiv(container, 'title');
        const subtitle = addDiv(container, 'subtitle');
        const notes = addDiv(container, 'notes');
        const table = addElem(container, 'table');
        const thead = addElem(table, 'thead');
        const tbody = addElem(table, 'tbody');
        const w = windows[0];
        const key = dateStr(w.date);
        let dataTable = eventData[key];
        const weekday = dayNames[w.date.getDay()];
        const weekData = indexDateRangeMap(weeklyData, w.date, {});
        if (!dataTable && weekday in weekData) {
          dataTable = {title: 'Schedule', schedule: weekData[weekday], category: '', notes: ''};
        }
        if (!dataTable) return;
        title.innerText = dataTable.title;
        subtitle.innerText = `${weekday} ${key}`;
        notes.innerText = `${dataTable.notes}`;
        const header = addElem(thead, 'tr');
        for (const text of ['Description', 'Location', 'Start Time', 'End Time', 'Instructors']) {
          const elem = addElem(header, 'th');
          elem.innerText = text;
        }
        for (const items of dataTable.schedule) {
          const row = addElem(tbody, 'tr');
          for (let i = 0; i < 5; i++) {
            let item = items[i];
            if (item === undefined) item = '';
            const elem = addElem(row, 'td');
            elem.innerText = item;
          }
        }
        window.print();
      }
      function getElemIndex(target, depth=1) {
        let parent = target.parentElement;
        let child = target;
        for (let i = 1; i < depth; i++) {
          child = parent;
          parent = child.parentElement;
        }
        return [...parent.children].indexOf(child);
      }
      
      class Display {
        constructor() {
          this.tables = [];
          this.tables.push(document.createElement('div'));
          this.tables.push(document.createElement('div'));
          this.tables.push(document.createElement('div'));
          this.tables[0].id = 'day-display';
          this.tables[1].id = 'month-display';
          this.tables[2].id = 'year-display';
          this.selector = new Selector(...this.tables);
        }
        
        render(w, data) {
          const index = this.selector.index;
          const elem = this.tables[this.selector.index];
          const printIcon = document.getElementById('print-icon');
          const weekData = indexDateRangeMap(weeklyData, w.date, {});
          switch (index) {
            case 0:
              printIcon.style.display = 'inline-block';
              const key = dateStr(w.date);
              const dataTable = data[key];
              const dataExists = dataTable && (dataTable.schedule.length > 0 || dataTable.category == 'No Class');
              const title = dataExists ? dataTable.title : 'Schedule';
              const weekday = dayNames[w.date.getDay()];
              elem.innerHTML = '';
              addSpan(elem, `${title}`, 'title');
              addSpan(elem, `${weekday} ${key}\n\n\n`, 'subtitle');
              let schedule;
              if (weekday in weekData) schedule = weekData[weekday];
              if (dataExists) schedule = dataTable.schedule;
              if (!schedule) return;
              let i = 0;
              for (let [...params] of schedule) {
                params = params.slice(0,4);
                params[2] = params[2] + ' - ' + params.pop();
                params.forEach(item => {
                  const s = addSpan(elem, item);
                  s.style.color = palette[i];
                });
                i++;
                if (i >= palette.length) i = 0;
              }
              addSpan(elem, '\n', 'title');
              break;
            case 1:
              printIcon.style.display = 'none';
              elem.innerHTML = '';
              addSpan(elem, 'Events\n\n', 'title');
              const firstDay = startOfMonth(w.date);
              const lastDay = endOfMonth(w.date);
              let day = firstDay;
              while (day <= lastDay) {
                const key = dateStr(day);
                if (key in data) {
                  const {title, category} = data[key];
                  const k = addSpan(elem, key);
                  const e = addSpan(elem, title);
                  k.style.color = categories[category];
                  e.style.color = categories[category];
                  k.style.textAlign = 'right';
                };
                addTime(day, 'day', 1);
              }
              addSpan(elem, '\n', 'title');
              break;
            case 2:
              printIcon.style.display = 'none';
              elem.innerHTML = '';
              addSpan(elem, 'Legend\n\n', 'title');
              for (const [name, color] of Object.entries(categories)) {
                const c = addDiv(elem, 'color-box');
                const n = addSpan(elem, name);
                c.style.backgroundColor = color;
                n.style.color = color;
              }
              addSpan(elem, '\n', 'title');
              break;
          }
        }
      }
      class DayWindow {
        constructor() {
          this.date = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'day-window';
          this.top = addDiv(this.elem, 'top');
          this.grid = addDiv(this.elem, 'grid');
          addSpan(this.top, 'Time', 'first-header');
          this.buildGridRows(8, 24);
        }
        
        buildGridRows(startHour, endHour) {
          this.grid.innerHTML = '';
          let time = new Date();
          time.setHours(startHour, 0, 0, 0);
          for (let i=startHour; i<=endHour; i++) {
            const row = addDiv(this.grid, 'row');
            const headerText = time.toLocaleTimeString('en-US', {
              hour: 'numeric',
              hour12: true,
            }).toLowerCase();
            const s = addSpan(row, headerText, 'side-header');
            const color = ((i-startHour) % 2 == 0) ? 'lightgray' : 'white';
            row.style.backgroundColor = color;
            time.setHours(time.getHours() + 1);
          }
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          const rows = grid.children;
          const key = this.date.toLocaleDateString('en-us', {
            month:'numeric', day:'numeric', year:'numeric'
          });
          const dataTable = data[key];
          const weekday = dayNames[this.date.getDay()];
          const weekData = indexDateRangeMap(weeklyData, this.date, {});
          let schedule;
          if (weekday in weekData) schedule = weekData[weekday];
          if (dataTable && (dataTable.schedule.length > 0 || dataTable.category == 'No Class')) {
            schedule = dataTable.schedule;
          }
          this.top.innerHTML = this.top.children[0].outerHTML;
          this.grid.innerHTML = '';
          let [startHour, endHour] = [14, 21];
          if (!schedule || schedule.length == 0) {
            this.buildGridRows(startHour, endHour);
            return;
          };
          const locations = [];
          for (const [name, location, start, end] of schedule) {
            startHour = Math.floor(Math.min(startHour, strToHours(start)));
            endHour = Math.ceil(Math.max(endHour, strToHours(end)));
          }
          this.buildGridRows(startHour, endHour);
          let i = 0;
          for (const [name, location, start, end] of schedule) {
            let index = locations.indexOf(location) + 1;
            if (index == 0) {
              index = locations.length + 1;
              locations.push(location);
              const header = addSpan(this.top, location, 'header');
              header.style.left = `${15*index-8}%`;
            }
            const block = addDiv(rows[0], 'event');
            const offset = strToHours(start) - startHour;
            const duration = strToHours(end) - strToHours(start);
            const count = rows.length
            block.style.top = `${6+94*offset/count}%`;
            block.style.left = `${15*index-8}%`
            block.style.height = `${94*duration/count}%`;
            block.style.backgroundColor = palette[i]; i++; if (i >= palette.length) i = 0;
            block.innerText = name;
          }
        }
      }
      class MonthWindow {
        constructor() {
          this.date = new Date();
          this.selected = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'month-window';
          const dayHeader = addDiv(this.elem, 'day-header');
          const grid = addDiv(this.elem, 'grid');
          for (const name of dayNames) {
            addSpan(dayHeader, name, 'day-header-item');
          }
          for (let i = 0; i < 42; i++) {
            const box = addDiv(grid, 'box');
            const dateText = addDiv(box, 'date');
            const nameText = addDiv(box, 'name');
          }
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          const firstDayOfMonth = startOfMonth(this.date);
          const lastDayOfMonth = endOfMonth(this.date);
          const today = dateStr(new Date());
          const selected = dateStr(this.selected);
          let day = startOfWeek(firstDayOfMonth);
          for (let i = 0; i < 42; i++) {
            const box = grid.children[i];
            const dateText = box.querySelector('.date');
            const nameText = box.querySelector('.name');
            const isActive = day >= firstDayOfMonth && day <= lastDayOfMonth;
            box.classList.toggle('inactive', !isActive);
            dateText.innerText = day.getDate();
            const key = dateStr(day);
            box.classList.toggle('today', key==today);
            box.classList.toggle('selected', key==selected);
            if (key in data && isActive) {
              const {title, category} = data[key];
              nameText.innerText = title;
              box.style.backgroundColor = categories[category];
            } else {
              nameText.innerText = '';
              box.style.backgroundColor = '';
            }
            addTime(day, 'day', 1);
          }
        }
      }
      class YearWindow {
        constructor(monthOffset = 0) {
          this.monthOffset = monthOffset;
          this.date = new Date();
          this.selected = new Date();
          this.elem = document.createElement('div');
          this.elem.id = 'year-window';
          const grid = addDiv(this.elem, 'grid');
          for (let i = 0; i < 12; i++) {
            const month = addDiv(grid, 'month');
            const banner = addDiv(month, 'banner');
            const mgrid = addDiv(month, 'mgrid');
            for (let j = 0; j < 7; j++) addSpan(mgrid, dayNames[j][0], 'day-name');
            for (let j = 0; j < 42; j++) addDiv(mgrid, 'date');
          }
        }
        
        getFirstDay() {
          let year = this.date.getFullYear();
          if (this.date.getMonth() < this.monthOffset) year--;
          return new Date(year, this.monthOffset, 1);
        }
        
        render(data) {
          const grid = this.elem.querySelector('.grid');
          let year = this.date.getFullYear();
          if (this.date.getMonth() < this.monthOffset) year--;
          for (let i = 0; i < 12; i++) {
            const month = new Date(year, i + this.monthOffset, 1);
            const monthBox = grid.children[i];
            const banner = monthBox.querySelector('.banner');
            const monthGrid = monthBox.querySelector('.mgrid');
            const firstDay = startOfMonth(month);
            const lastDay = endOfMonth(month);
            const today = dateStr(new Date());
            const selected = dateStr(this.selected);
            banner.innerText = month.toLocaleString('en-US', {month:'long', year:'numeric'});
            for (let j = 0; j < 7; j++) {
              monthGrid.children[j].innerText = dayNames[j][0];
            }
            let day = startOfWeek(firstDay);
            for (let j = 0; j < 42; j++) {
              const box = monthGrid.children[7 + j];
              const withinMonth = firstDay <= day && day <= lastDay;
              if (withinMonth) {
                box.innerText = day.getDate();
                const key = dateStr(day);
                if (key in data) {
                  const {title, category} = data[key];
                  box.style.backgroundColor = categories[category];
                } else {
                  box.style.backgroundColor = '';
                }
                box.classList.toggle('today', key==today);
                box.classList.toggle('selected', key==selected);
              } else {
                box.innerText = '';
                box.style.backgroundColor = '';
                box.classList.toggle('today', false);
                box.classList.toggle('selected', false);
              }
              addTime(day, 'day', 1);
            }
          }
        }
      }
      class Selector {
        constructor(...elems) {
          this.index = 0;
          this.elems = elems;
          this.className = 'selected';
        }
        
        select(index) {
          this.index = index;
          this.elems.forEach((elem, i) => {
            elem.classList.toggle(this.className, i==index);
          })
        }
      }
      
      let currentTab = Number(getStored('currentTab', 1));
      loadDataPage(eventData, getStored('eventData'));
      loadWeekPage(weeklyData, getStored('weekData'));
      loadCategoryPage(categories, getStored('categoryData'));
      fetchData(
        eventData, weeklyData, categories,
        'https://docs.google.com/spreadsheets/d/1G4BoG5Jumb-N_HVgcvb5e1noY3rL4GG_F5kfpcgIl6s/export?format=csv&gid=0',
        'https://docs.google.com/spreadsheets/d/1G4BoG5Jumb-N_HVgcvb5e1noY3rL4GG_F5kfpcgIl6s/export?format=csv&gid=1592630584',
        'https://docs.google.com/spreadsheets/d/1G4BoG5Jumb-N_HVgcvb5e1noY3rL4GG_F5kfpcgIl6s/export?format=csv&gid=1588629629',
      );
      
      const modeButtons = document.getElementById('mode-buttons');
      const display = document.getElementById('display');
      const windowWrapper = document.getElementById('windows');
      const windows = [new DayWindow(), new MonthWindow(), new YearWindow(6)];
      const windowElems = windows.map(w => w.elem);
      const windowSelector = new Selector(...windowElems);
      const modeSelector = new Selector(...modeButtons.children);
      
      const displayObj = new Display();
      display.append(...displayObj.tables);
      
      windowWrapper.append(...windowElems);
      
      [...modeButtons.children].forEach((button, index) => {
        button.addEventListener('click', () => selectTab(index))
      })
      
      const windowHeader = document.querySelector('#window-banner .header');
      const [lnav, title, rnav] = windowHeader.children;
      lnav.addEventListener('click', () => {
        const i = modeSelector.index;
        addTime(windows[i].date, ['day', 'month', 'year'][i], -1);
        syncDates();
        render(i);
      });
      rnav.addEventListener('click', () => {
        const i = modeSelector.index;
        addTime(windows[i].date, ['day', 'month', 'year'][i], 1);
        syncDates();
        render(i);
      })
      const todayButton = document.getElementById('today-button');
      todayButton.addEventListener('click', () => {
        for (let i = 0; i < windows.length; i++){
          windows[i].date.setTime(Date.now());
        }
        syncDates();
        render(modeSelector.index);
      })
      windowElems[2].addEventListener('click', event => {
        const elem = event.target;
        const day = windows[2].getFirstDay();
        if (elem.classList.contains('date') && elem.innerText != '') {
          addTime(day, 'month', getElemIndex(elem, 3));
          day.setDate(Number(elem.innerText));
          windows[0].date.setTime(day.getTime());
          selectTab(0);
        } else if (elem.classList.contains('banner')) {
          addTime(day, 'month', getElemIndex(elem, 2))
          windows[1].date.setTime(day.getTime());
          selectTab(1);
        }
      });
      windowElems[1].addEventListener('click', event => {
        const elem = event.target;
        const date = startOfWeek(startOfMonth(windows[1].date));
        if (elem.parentElement.classList.contains('box')) {
          addTime(date, 'day', getElemIndex(elem, 2));
          windows[0].date.setTime(date.getTime());
          selectTab(0);
        }
      })
      
      selectTab(currentTab);
    </script>
  
  </body>
